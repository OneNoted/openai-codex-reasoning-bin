name: validate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  metadata:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Validate packaging metadata
        run: >
          ./scripts/run-in-arch-container.sh
          'pacman -Syu --noconfirm diffutils &&
          ./scripts/validate-repo.sh'
